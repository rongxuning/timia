services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: ${TIMIA_ENV_FILE:?set TIMIA_ENV_FILE — use deploy/dc-prod.sh}
    volumes:
      - timia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  core-service:
    build:
      context: ./codes/core-service
    restart: unless-stopped
    env_file: ${TIMIA_ENV_FILE:?set TIMIA_ENV_FILE — use deploy/dc-prod.sh}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  # notification-service:
  #   build: { context: ./codes/notification-service }
  #   expose: ["8001"]

  web:
    build:
      context: ./codes/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/prod/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - core-service
      - web

volumes:
  timia_pgdata:
