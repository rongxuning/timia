# Timia production reverse proxy (HTTP, single domain).
# DNS: timia.online → server public IP.
#   /      → Next.js (web:3000)
#   /api/  → FastAPI (api:8000), prefix stripped by nginx
#
# Set in .env.prod:
#   NEXT_PUBLIC_API_BASE_URL=https://timia.online/api
#   CORS_ORIGINS=https://timia.online

upstream timia_web {
    server web:3000;
}

upstream timia_api {
    server api:8000;
}

server {
    listen 80;
    server_name timia.online;

    location /api/ {
        proxy_pass http://timia_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://timia_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
