# Timia production — https://timia.online
#   /      → Next.js (web:3000)
#   /api/  → FastAPI (api:8000), /api prefix stripped
#
# .env.prod:
#   NEXT_PUBLIC_API_BASE_URL=https://timia.online/api
#   CORS_ORIGINS=https://timia.online

upstream timia_web {
    server web:3000;
}

upstream timia_api {
    server api:8000;
}

server {
    listen 80;
    server_name timia.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name timia.online;

    ssl_certificate     /etc/letsencrypt/live/timia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timia.online/privkey.pem;

    location /api/ {
        proxy_pass http://timia_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://timia_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
